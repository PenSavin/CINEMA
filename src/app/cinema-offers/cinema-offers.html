<div class="bg-black">
  <app-navbar></app-navbar>

  <div class="pt-20 min-h-screen flex items-center justify-center bg-cover bg-center relative"
    style="background-image: url('assets/offer.jpg');">

    <div class="absolute inset-0 bg-black/60 backdrop-blur-md">
    </div>

    <div class="relative z-10 w-full max-w-4xl mx-auto px-6 py-12">
      <img class="rounded-2xl w-full h-auto object-cover shadow-2xl mt-20" src="assets/offer.jpg"
        alt="Promotion Banner">

      <h1 class="text-4xl font-bold text-white mt-8 mb-6">Current Promotions</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        @for (offer of offers; track offer.id) {
        @if (offer.active) {
        <div class="bg-white/10 border border-white/20 p-6 rounded-xl hover:bg-white/20 transition-all duration-300">
          <h3 class="text-xl font-semibold text-white mb-2">{{ offer.title }}</h3>
          <p class="text-gray-200 text-sm leading-relaxed">{{ offer.description }}</p>

          <span
            class="inline-block mt-4 px-3 py-1 bg-blue-500 text-white text-xs font-bold rounded-full uppercase tracking-wider">
            {{ offer.type }}
          </span>
        </div>
        }
        }
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
