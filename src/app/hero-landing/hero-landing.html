<div class="container mx-auto px-3 sm:px-6 lg:px-8 pt-20 sm:pt-24 pb-10">

  <!-- Tabs -->
  <div class="flex flex-wrap items-center justify-center gap-3 sm:gap-8 mb-6 sm:mb-10">

    <button (click)="setTab('now')" class="transition duration-300" [class.text-white]="activeTab === 'now'"
      [class.text-gray-400]="activeTab !== 'now'" [class.font-bold]="activeTab === 'now'">

      <h2 class="text-lg xs:text-xl sm:text-2xl md:text-3xl lg:text-4xl cursor-pointer">
        Now Showing
      </h2>

    </button>

    <span class="hidden sm:block w-px h-10 bg-white/30"></span>

    <button (click)="setTab('coming')" class="transition duration-300" [class.text-white]="activeTab === 'coming'"
      [class.text-gray-400]="activeTab !== 'coming'" [class.font-bold]="activeTab === 'coming'">

      <h2 class="text-lg xs:text-xl sm:text-2xl md:text-3xl lg:text-4xl cursor-pointer">
        Coming Soon
      </h2>

    </button>

  </div>

  <!-- Date Selector -->
  <div class="flex gap-2 xs:gap-3 sm:gap-4 overflow-x-auto pb-4 mb-6 sm:mb-10 scrollbar-thin scrollbar-thumb-white/20 -mx-3 px-3 sm:mx-0 sm:px-0">

    @for (day of days; track day.date) {

    <div (click)="selectedDate = day.date"
      class="min-w-[64px] xs:min-w-[72px] sm:min-w-[100px] rounded-xl border p-2.5 xs:p-3 sm:p-4 text-center flex-shrink-0 cursor-pointer transition duration-300"
      [class.bg-blue-600]="selectedDate === day.date" [class.border-blue-600]="selectedDate === day.date"
      [class.border-white/20]="selectedDate !== day.date" [class.hover:bg-white/10]="selectedDate !== day.date">

      <p class="text-[11px] xs:text-xs sm:text-sm text-gray-400">
        {{ day.date | date:'EEE' }}
      </p>

      <p class="text-lg xs:text-xl sm:text-2xl font-bold text-white">
        {{ day.date | date:'dd' }}
      </p>

    </div>

    }

  </div>

  <!-- Empty State -->
  @if (filteredMovies.length === 0) {

  <div class="text-center py-16 sm:py-20 text-gray-400 text-sm sm:text-base">
    No movies available
  </div>

  }

  <!-- Movies Grid -->
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 xs:gap-4 sm:gap-6">

    @for (movie of filteredMovies; track movie.id) {

    <div class="bg-gray-900 rounded-xl overflow-hidden shadow-lg hover:scale-105 transition duration-300 flex flex-col">

      <img [src]="movie.image" [alt]="movie.title" class="w-full aspect-[2/3] object-cover">

      <div class="p-2.5 xs:p-3 sm:p-4 flex flex-col flex-grow">

        <h3 class="text-xs xs:text-sm sm:text-base lg:text-lg font-semibold text-white mb-1.5 sm:mb-2 line-clamp-2">
          {{ movie.title }}
        </h3>

        <p class="text-[11px] xs:text-xs sm:text-sm text-gray-400 mb-2.5 sm:mb-4">
          {{ movie.releaseDate | date:'mediumDate' }}
        </p>

        <button [routerLink]="['/movie', movie.id]"
          class="w-full mt-auto bg-blue-600 hover:bg-blue-700 text-white py-1.5 xs:py-2 text-xs xs:text-sm sm:text-base rounded-lg transition cursor-pointer">
          View Details
        </button>

      </div>

    </div>

    }

  </div>

</div>
