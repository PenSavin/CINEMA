<section class="relative flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 sm:py-20 lg:px-10">
  <div class="absolute inset-0 scale-110 bg-cover bg-center blur-xl transition-all duration-700"
    [style.background-image]="'url(' + movies[currentIndex].image + ')'" aria-hidden="true"></div>
  <div class="absolute inset-0 bg-black/75" aria-hidden="true"></div>
  <div
    class="absolute left-1/2 top-1/2 h-72 w-72 -translate-x-1/2 -translate-y-1/2 rounded-full bg-orange-500/25 blur-3xl sm:h-[34rem] sm:w-[34rem]"
    aria-hidden="true"></div>
  <div class="absolute bottom-[-8rem] right-[-6rem] h-96 w-96 rounded-full bg-amber-300/20 blur-3xl" aria-hidden="true">
  </div>

  <div class="relative z-10 mx-auto w-full max-w-6xl pt-6 sm:pt-10">
    <article class="group relative mx-auto
  aspect-[3/4]
  xs:aspect-[4/5]
  sm:aspect-[16/10]
  lg:aspect-[16/8]
  min-h-[460px]
  sm:min-h-[420px]
  max-h-[700px]
  overflow-hidden rounded-2xl sm:rounded-3xl border border-white/15 bg-white/10 shadow-2xl shadow-black/70 backdrop-blur-xl">

      <img class="absolute inset-0 h-full w-full object-cover transition duration-700 group-hover:scale-105"
        [src]="movies[currentIndex].image" [alt]="movies[currentIndex].title" />

      <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-black/10"></div>

      <div class="absolute inset-x-0 bottom-0 flex flex-col gap-3 p-4 sm:gap-4 sm:p-8 lg:p-12">

        <div class="max-w-3xl">
          <p class="mb-1.5 text-[9px] font-black uppercase tracking-[0.25em] text-amber-300 sm:mb-2 sm:text-xs sm:tracking-[0.3em]">
            Now Showing
          </p>

          <h1 class="text-xl font-black leading-tight text-white xs:text-2xl sm:text-5xl lg:text-7xl">
            {{ movies[currentIndex].title }}
          </h1>

          <p class="mt-2 max-w-2xl text-xs leading-5 text-white/75 line-clamp-2 sm:mt-3 sm:line-clamp-3 sm:text-base sm:leading-6">
            {{ movies[currentIndex].description }}
          </p>
        </div>

        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">

          <button
            class="order-2 w-full rounded-full bg-red-600 px-6 py-2.5 text-xs font-black uppercase tracking-wide text-white shadow-xl shadow-red-950/50 transition hover:-translate-y-0.5 hover:bg-red-500 sm:order-1 sm:w-auto sm:px-7 sm:py-3 sm:text-sm"
            type="button">
            Book Now
          </button>

          <div class="order-1 flex items-center justify-between sm:order-2 sm:justify-end sm:gap-3">

            <button
              class="flex h-9 w-9 items-center justify-center rounded-full border border-white/15 bg-black/35 text-white shadow-lg backdrop-blur transition hover:border-amber-300/50 hover:bg-white/20 active:scale-95 sm:h-12 sm:w-12"
              (click)="prevSlide()" type="button" aria-label="Previous movie">

              <svg class="h-4 w-4 sm:h-5 sm:w-5" viewBox="0 0 24 24" fill="none">
                <path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>

            </button>

            <button
              class="ml-3 flex h-9 w-9 items-center justify-center rounded-full border border-white/15 bg-black/35 text-white shadow-lg backdrop-blur transition hover:border-amber-300/50 hover:bg-white/20 active:scale-95 sm:ml-0 sm:h-12 sm:w-12"
              (click)="nextSlide()" type="button" aria-label="Next movie">

              <svg class="h-4 w-4 sm:h-5 sm:w-5" viewBox="0 0 24 24" fill="none">
                <path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>

            </button>

          </div>
        </div>

        <div class="flex items-center justify-center gap-1.5 sm:justify-start sm:gap-2">
          @for (movie of movies; track movie.title; let i = $index) {
          <button class="h-2 rounded-full transition-all duration-300 sm:h-2.5" [class.w-8]="i === currentIndex"
            [class.sm:w-10]="i === currentIndex" [class.w-2]="i !== currentIndex"
            [class.sm:w-2.5]="i !== currentIndex" [class.bg-amber-300]="i === currentIndex"
            [class.bg-white/35]="i !== currentIndex" (click)="goToSlide(i)" type="button"
            [attr.aria-label]="'Show ' + movie.title">
          </button>
          }
        </div>

      </div>
    </article>
  </div>
</section>
