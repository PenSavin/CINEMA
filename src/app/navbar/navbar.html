<nav class="fixed left-0 right-0 top-0 z-50 border-b border-white/10 bg-black/35 shadow-2xl backdrop-blur-xl">

  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

    <!-- TOP BAR -->
    <div class="flex min-h-20 items-center justify-between gap-4 border-b border-white/10 py-4">

      <!-- MOBILE JOIN NOW -->
      <a routerLink="/auth" class="md:hidden">
        <button
          class="h-10 rounded-full bg-red-600 px-4 text-xs font-bold uppercase text-white shadow-lg shadow-red-950/40 transition hover:bg-red-500 cursor-pointer">
          Join Now
        </button>
      </a>

      <!-- SEARCH -->
      <form (ngSubmit)="searchMovies()" class="relative hidden w-full max-w-xs items-center sm:flex">
        <label class="sr-only" for="movie-search">Search movies</label>

        <svg class="pointer-events-none absolute left-4 h-5 w-5 text-white/50" viewBox="0 0 24 24" fill="none">
          <path
            d="m21 21-4.3-4.3m2.3-5.2a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round" />
        </svg>

        <input
          id="movie-search"
          name="search"
          [(ngModel)]="searchTerm"
          (search)="searchMovies()"
          class="h-11 w-full rounded-full border border-white/10 bg-white/10 pl-12 pr-4 text-sm text-white outline-none transition placeholder:text-white/45 focus:border-amber-300/60 focus:bg-white/15 focus:ring-2 focus:ring-amber-400/20"
          type="search"
          placeholder="Search movies..." />
      </form>

      <!-- LOGO (Desktop Only) -->
      <a
        routerLink="/home"
        class="absolute left-1/2 hidden -translate-x-1/2 items-center gap-3 cursor-pointer md:flex"
        aria-label="Legend Cinema home">

        <img src="/Logo.png" alt="Legend Cinema" class="h-15 w-15" />
      </a>

      <!-- RIGHT ACTIONS -->
      <div class="ml-auto flex items-center gap-2 sm:gap-3">

        <!-- Tickets -->
        <button
          class="flex h-11 w-11 items-center justify-center rounded-full border border-white/10 bg-white/10 text-white transition hover:border-amber-300/50 hover:bg-amber-400/20 cursor-pointer"
          type="button"
          aria-label="Tickets">

          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none">
            <path
              d="M4 8.5V6.8C4 5.8 4.8 5 5.8 5h12.4c1 0 1.8.8 1.8 1.8v1.7a2.5 2.5 0 0 0 0 5V17.2c0 1-.8 1.8-1.8 1.8H5.8c-1 0-1.8-.8-1.8-1.8v-3.7a2.5 2.5 0 0 0 0-5Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round" />
            <path
              d="M14 5v14"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-dasharray="2 2" />
          </svg>

        </button>

        <!-- Join Now Desktop -->
        <a routerLink="/auth" class="hidden md:block">
          <button
            class="hidden h-11 rounded-full bg-red-600 px-5 text-sm font-bold uppercase text-white shadow-lg shadow-red-950/40 transition hover:bg-red-500 cursor-pointer md:inline-flex md:items-center"
            type="button">
            Join Now
          </button>
        </a>

        <!-- Notifications -->
        <button
          class="flex h-11 w-11 items-center justify-center rounded-full border border-white/10 bg-white/10 text-white transition hover:border-amber-300/50 hover:bg-amber-400/20 cursor-pointer"
          type="button"
          aria-label="Notifications">

          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none">
            <path
              d="M18 9.5a6 6 0 0 0-12 0c0 7-2 7-2 7h16s-2 0-2-7ZM14 20a2.2 2.2 0 0 1-4 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>

        </button>

        <!-- Language -->
        <!-- <select
          class="h-11 cursor-pointer rounded-full border border-white/10 bg-black/40 px-3 text-sm font-semibold text-white outline-none transition focus:border-amber-300/60"
          aria-label="Language selector">
          <option>EN</option>
          <option>KH</option>
          <option>CN</option>
        </select> -->

      </div>
    </div>

    <!-- MENU -->
    <div class="flex items-center justify-between gap-4 overflow-visible py-4">

      <div class="flex min-w-0 flex-wrap items-center gap-5 text-sm font-semibold sm:gap-8">

        <a
          routerLink="/home"
          routerLinkActive="text-amber-300 border-b-2 border-amber-300"
          [routerLinkActiveOptions]="{ exact: true }"
          class="whitespace-nowrap text-white/70 hover:text-white transition pb-1 cursor-pointer">
          Home
        </a>

        <a
          routerLink="/cinema"
          routerLinkActive="text-amber-300 border-b-2 border-amber-300"

        <a

          Offers
        </a>

        <a
          routerLink="/food"
          routerLinkActive="text-amber-300 border-b-2 border-amber-300"
          class="whitespace-nowrap text-white/70 hover:text-white transition pb-1 cursor-pointer">
          Food & Beverage
        </a>

      </div>
